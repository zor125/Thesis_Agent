name: Daily Paper Fetch

on:
  schedule:
    # GitHub Actions cron uses UTC. 22:00 UTC is 07:00 KST.
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch today's cs.AI papers
        run: python fetch.py --category cs.AI --max-results 100 --output papers_today.json

      - name: Upload fetched papers
        uses: actions/upload-artifact@v4
        with:
          name: papers-today
          path: papers_today.json
